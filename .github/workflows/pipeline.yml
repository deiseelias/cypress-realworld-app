name: 'CI - Pipeline de Testes Automatizados'

on:
  push:
    branches:
      - master
      # - main # Comente ou remova esta linha se você usa a 'master' como principal
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

# Bloqueia execuções paralelas para o mesmo push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cypress-run:
    name: 'Instalar Dependências e Executar Testes'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: Instalar Dependências
        run: yarn install --frozen-lockfile

      - name: Executar Bateria de Testes Cypress
        run: yarn cypress run
        continue-on-error: true

      - name: Armazenar e Publicar Artefatos do Relatório
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-evidencias-cypress
          path: |
            cypress/screenshots/
            cypress/videos/
          retention-days: 5